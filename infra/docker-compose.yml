services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: mlops
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7

  garage:
    image: dxflrs/garage:v0.8.2
    command: server
    volumes:
      - garage_data:/var/lib/garage
    ports:
      - "3900:3900"
      - "3901:3901"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://admin:admin@postgres:5432/mlops
      --default-artifact-root s3://mlflow/
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      MLFLOW_S3_ENDPOINT_URL: http://garage:3900
    depends_on:
      - postgres
      - garage

  trainer:
    build: .
    command: python trainer/train.py
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      MLFLOW_S3_ENDPOINT_URL: http://garage:3900
    depends_on:
      - mlflow

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    depends_on:
      - mlflow

  worker:
    build: .
    command: celery -A worker.celery_app worker --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - redis

  prometheus:
    image: prom/prometheus:v2.48.0
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"

  loki:
    image: grafana/loki:2.9.0

volumes:
  pgdata:
  garage_data: