global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics

  - job_name: 'mlflow'
    static_configs:
      - targets: ['mlflow:5000']
    metrics_path: /metrics

  - job_name: 'promtail'
    static_configs:
      - targets: ['promtail:9080']

  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']