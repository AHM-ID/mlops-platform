[SERVICE]
    Flush               1
    Log_Level           info
    Parsers_File        parsers.conf
    HTTP_Server         On
    HTTP_Listen         0.0.0.0
    HTTP_Port           2020

[INPUT]
    Name                http
    Tag                 app.logs
    Listen              0.0.0.0
    Port                8888

[FILTER]
    Name                parser
    Match               app.logs
    Key_Name            log
    Parser              json
    Reserve_Data        On

[OUTPUT]
    Name                loki
    Match               *
    Host                loki
    Port                3100
    Labels              job=fluent-bit
    storage.total_limit_size 1G