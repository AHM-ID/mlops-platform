[SERVICE]
    Flush               1
    Log_Level           debug
    Parsers_File        /fluent-bit/etc/parsers.conf
    HTTP_Server         On
    HTTP_Listen         0.0.0.0
    HTTP_Port           2020

[INPUT]
    Name                http
    Tag                 app.logs
    Listen              0.0.0.0
    Port                8888
    successful_response_code 200

[FILTER]
    Name                parser
    Match               app.logs
    Key_Name            log
    Parser              json
    Reserve_Data        On
    Preserve_Key        On

[OUTPUT]
    Name                loki
    Match               app.logs
    Host                loki
    Port                3100
    Labels              job=fluent-bit
    label_keys          $service,$level
    line_format         json
    Retry_Limit         3