apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: prometheus
          matcherRegex: "request_id=\"([^\"]+)\""
          name: RequestID
          url: "/api/monitoring/health/system?request_id=${__value.raw}"
    version: 1