services:
  postgres:
    image: ${DOCKER_REGISTRY}/postgres:15
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ${DOCKER_REGISTRY}/redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  garage:
    image: ${DOCKER_REGISTRY}/dxflrs/garage:v0.8.2
    entrypoint: /garage
    command: server
    volumes:
      - garage_data:/var/lib/garage
      - ./infra/garage.toml:/etc/garage.toml:ro,Z
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    command: >
      sh -c "pip install -q --index-url https://pypi.org/simple/ psycopg2-binary && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB} --default-artifact-root s3://mlflow/"
    env_file:
      - .env
    depends_on:
      - postgres
      - garage
    restart: on-failure

  trainer:
    build:
      context: .
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY}
        PIP_INDEX_URL: ${PIP_INDEX_URL}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST}
    command: python trainer/train.py
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro,Z
    depends_on:
      - mlflow
    restart: on-failure

  api:
    build:
      context: .
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY}
        PIP_INDEX_URL: ${PIP_INDEX_URL}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST}
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    depends_on:
      - mlflow
    restart: on-failure

  worker:
    build:
      context: .
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY}
        PIP_INDEX_URL: ${PIP_INDEX_URL}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST}
    command: celery -A worker.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro,Z
    depends_on:
      - redis
      - mlflow
    restart: on-failure

  prometheus:
    image: ${DOCKER_REGISTRY}/prom/prometheus:v2.48.0
    user: root
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
    ports:
      - "9090:9090"

  grafana:
    image: ${DOCKER_REGISTRY}/grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana

  loki:
    image: ${DOCKER_REGISTRY}/grafana/loki:2.9.0
    user: root
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki-config.yml:/etc/loki/config.yml:ro,z
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml

  fluent-bit:
    image: fluent/fluent-bit:2.2
    user: root
    volumes:
      - ./infra/fluent-bit:/fluent-bit/etc/:ro,Z
      - fluent-bit-storage:/tmp/flb-storage
    ports:
      - "2020:2020"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2020"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: /fluent-bit/bin/fluent-bit -c /fluent-bit/etc/fluent-bit.conf
    depends_on:
      - loki

  nginx:
    image: ${DOCKER_REGISTRY}/nginx:alpine
    user: root
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro,Z
    depends_on:
      - api
      - mlflow
    restart: on-failure

volumes:
  pgdata:
  garage_data:
  grafana_data:
  loki_data:
  fluent-bit-storage: