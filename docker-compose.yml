services:
  postgres:
    image: ${DOCKER_REGISTRY}/postgres:15
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mlops-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ${DOCKER_REGISTRY}/redis:7
    networks:
      - mlops-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  garage:
    image: ${DOCKER_REGISTRY}/dxflrs/garage:v0.8.2
    entrypoint: /garage
    command: server
    volumes:
      - garage_data:/var/lib/garage${SELINUX}
      - ./infra/garage.toml:/etc/garage.toml:ro${SELINUX_RO}
    networks:
      - mlops-network
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 20s

  garage-setup:
    image: mlops-platform-base:latest 
    entrypoint: /bin/bash
    command: /app/scripts/garage-setup.sh
    volumes:
      - ./infra/garage.toml:/etc/garage.toml:ro${SELINUX_RO}
      - garage_data:/var/lib/garage${SELINUX}
      - ./.env:/app/.env${SELINUX}
    networks:
      - mlops-network
    depends_on:
      garage:
        condition: service_healthy
    restart: "no"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    command: >
      sh -c "pip install -q psycopg2-binary && 
             mlflow server --host 0.0.0.0 --port 5000 
             --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB} 
             --default-artifact-root s3://mlflow/"
    env_file: .env
    networks:
      - mlops-network
    depends_on:
      postgres:
        condition: service_healthy

  trainer:
    image: mlops-platform-base:latest 
    command: python trainer/train.py --source csv
    env_file: .env
    volumes:
      - ./data:/app/data:ro${SELINUX_RO}
      - ./trainer:/app/trainer:ro${SELINUX_RO}
      - ./shared:/app/shared:ro${SELINUX_RO}
    networks:
      - mlops-network
    depends_on:
      mlflow:
        condition: service_started
      fluent-bit:
        condition: service_started
    restart: "no"

  api:
    image: mlops-platform-base:latest 
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --root-path /api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api:ro,${SELINUX_RO}
      - ./shared:/app/shared:ro,${SELINUX_RO}
      - prometheus_metrics:/prometheus-metrics
    networks:
      - mlops-network
    depends_on:
      mlflow:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: on-failure

  worker:
    image: mlops-platform-base:latest 
    command: celery -A worker.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro${SELINUX_RO}
      - prometheus_metrics:/prometheus-metrics
    networks:
      - mlops-network
    depends_on:
      - redis
      - mlflow
    restart: on-failure

  prometheus:
    image: ${DOCKER_REGISTRY}/prom/prometheus:v2.48.0
    user: root
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro${SELINUX_RO}
    networks:
      - mlops-network
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.external-url=http://localhost:8080/prometheus/'
      - '--web.route-prefix=/prometheus/'

  grafana:
    image: ${DOCKER_REGISTRY}/grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: "http://localhost:8080/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro${SELINUX_RO}
    networks:
      - mlops-network

  loki:
    image: ${DOCKER_REGISTRY}/grafana/loki:2.9.0
    user: root
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki-config.yml:/etc/loki/config.yml:ro${SELINUX_RO}
      - loki_data:/loki
    networks:
      - mlops-network
    command: -config.file=/etc/loki/config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  fluent-bit:
    image: fluent/fluent-bit:2.2
    user: root
    volumes:
      - ./infra/fluent-bit:/fluent-bit/etc/:ro${SELINUX_RO}
      - fluent-bit-storage:/tmp/flb-storage
    networks:
      - mlops-network
    ports:
      - "2020:2020"
      - "8888:8888"
    environment:
      - SERVICE_NAME=fluent-bit
    depends_on:
      loki:
        condition: service_healthy
    command: /fluent-bit/bin/fluent-bit -c /fluent-bit/etc/fluent-bit.conf
    restart: unless-stopped

  nginx:
    image: ${DOCKER_REGISTRY}/nginx:alpine
    user: root
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro${SELINUX_RO}
    networks:
      - mlops-network
    depends_on:
      - api
      - mlflow
    restart: always

networks:
  mlops-network:
    driver: bridge
    name: mlops-platform-network

volumes:
  pgdata:
  garage_data:
    name: mlops-platform_garage_data
  grafana_data:
  prometheus_metrics:
  loki_data:
  fluent-bit-storage: