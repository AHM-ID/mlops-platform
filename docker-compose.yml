services:
  postgres:
    image: ${DOCKER_REGISTRY}/postgres:15
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ${DOCKER_REGISTRY}/redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  garage:
    image: ${DOCKER_REGISTRY}/dxflrs/garage:v0.8.2
    command: server
    volumes:
      - garage_data:/var/lib/garage
    ports:
      - "3900:3900"
      - "3901:3901"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    command: >
      sh -c "./scripts/wait.sh postgres:5432 -- 
             mlflow server
             --host 0.0.0.0
             --port 5000
             --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
             --default-artifact-root s3://mlflow/"
    env_file:
      - .env
    volumes:
      - ./scripts:/scripts
    depends_on:
      postgres:
        condition: service_healthy

  trainer:
    build:
      context: .
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY}
        PIP_INDEX_URL: ${PIP_INDEX_URL}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST}
    command: >
      sh -c "./scripts/wait.sh mlflow:5000 -- 
             python trainer/train.py"
    env_file:
      - .env
    volumes:
      - ./scripts:/scripts
    depends_on:
      mlflow:
        condition: service_healthy

  api:
    build:
      context: .
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY}
        PIP_INDEX_URL: ${PIP_INDEX_URL}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST}
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    depends_on:
      mlflow:
        condition: service_healthy

  worker:
    build:
      context: .
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY}
        PIP_INDEX_URL: ${PIP_INDEX_URL}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST}
    command: >
      sh -c "./scripts/wait.sh redis:6379 -- 
             celery -A worker.celery_app worker --loglevel=info"
    env_file:
      - .env
    volumes:
      - ./scripts:/scripts
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy

  prometheus:
    image: ${DOCKER_REGISTRY}/prom/prometheus:v2.48.0
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: ${DOCKER_REGISTRY}/grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana

  loki:
    image: ${DOCKER_REGISTRY}/grafana/loki:2.9.0
    ports:
      - "3100:3100"

  promtail:
    image: ${DOCKER_REGISTRY}/grafana/promtail:2.9.0
    volumes:
      - /var/lib/containers:/var/lib/containers
      - ./infra/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  nginx:
    image: ${DOCKER_REGISTRY}/nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - mlflow

volumes:
  pgdata:
  garage_data:
  grafana_data: