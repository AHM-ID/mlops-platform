stages:
  - test
  - build

variables:
  DOCKER_REGISTRY: docker.arvancloud.ir
  PIP_INDEX_URL: https://pypi.devneeds.ir/simple/
  PIP_TRUSTED_HOST: pypi.devneeds.ir
  APT_MIRROR: http://linux-mirror.liara.ir/repository/debian
  APT_MIRROR_SECURITY: http://linux-mirror.liara.ir/repository/debian-security
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  TESTING: "true"

test:
  stage: test
  image: ${DOCKER_REGISTRY}/python:3.11.9-slim
  timeout: 45m
  cache:
    key: pip-py311-devneeds
    paths:
      - .cache/pip
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  before_script:
    - mkdir -p .cache/pip
    - chmod +x scripts/ci_install_deps.sh
    - scripts/ci_install_deps.sh
  script:
    - python -m pytest tests/ -v -m "not integration" --tb=short

build:
  stage: build
  image: ${DOCKER_REGISTRY}/docker:24
  services:
    - docker:24-dind
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "${CI_JOB_TOKEN}" | docker login ${DOCKER_REGISTRY} -u ${CI_REGISTRY_USER} --password-stdin
    - cat ${HARBOR_PASSWORD} | docker login ${HARBOR_REGISTRY} -u ${HARBOR_USERNAME} --password-stdin
  script:
    - |
      docker build \
        --build-arg DOCKER_REGISTRY=${DOCKER_REGISTRY} \
        --build-arg PIP_INDEX_URL=${PIP_INDEX_URL} \
        --build-arg PIP_TRUSTED_HOST=${PIP_TRUSTED_HOST} \
        --build-arg APT_MIRROR=${APT_MIRROR} \
        --build-arg APT_MIRROR_SECURITY=${APT_MIRROR_SECURITY} \
        -t ${HARBOR_IMAGE}:${CI_COMMIT_SHORT_SHA} \
        -t ${HARBOR_IMAGE}:latest \
        .
    - docker push ${HARBOR_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${HARBOR_IMAGE}:latest