# GitLab CI — mocked unit tests (no live platform stack).
#
# Project-level PIP_INDEX_URL on shared runners may point to runflare (402).
# Pip commands below use hardcoded Liara URLs and ignore runner pip.conf.
# Also remove runflare vars: Settings → CI/CD → Variables.

stages:
  - test
  - build
  - deploy

variables:
  DOCKER_REGISTRY: docker.arvancloud.ir
  LIARA_PIP_INDEX: https://package-mirror.liara.ir/repository/pypi/simple
  LIARA_PIP_HOST: package-mirror.liara.ir
  LIARA_APT_MIRROR: http://linux-mirror.liara.ir/repository/debian
  LIARA_APT_SECURITY: http://linux-mirror.liara.ir/repository/debian-security
  TESTING: "true"
  RATE_LIMIT_ENABLED: "false"
  PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus-test
  MLFLOW_TRACKING_URI: http://localhost:5000
  REDIS_URL: redis://localhost:6379/0
  POSTGRES_HOST: localhost
  API_KEY_ADMIN: admin-secret-key-change-in-production
  API_KEY_USER: user-secret-key-change-in-production
  API_KEY_READONLY: readonly-secret-key-change-in-production

test:
  stage: test
  image: python:3.11.9-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  before_script:
    - mkdir -p "$PROMETHEUS_MULTIPROC_DIR"
    # Bypass project/runner PIP_INDEX_URL (often runflare) and any pip.conf on the runner
    - unset PIP_INDEX_URL PIP_TRUSTED_HOST PIP_EXTRA_INDEX_URL || true
    - export PIP_CONFIG_FILE=/dev/null
    - export PIP_NO_CACHE_DIR=1
    # Do not upgrade pip — slim image ships pip 24.x; upgrade often hangs on slow mirrors
    - |
      python -m pip install \
        --default-timeout=300 \
        --retries 5 \
        --trusted-host package-mirror.liara.ir \
        -i https://package-mirror.liara.ir/repository/pypi/simple \
        -r requirements.txt
  script:
    - python -m pytest tests/ -v -m "not integration" --tb=short

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build
        --build-arg DOCKER_REGISTRY=${DOCKER_REGISTRY}
        --build-arg PIP_INDEX_URL=${LIARA_PIP_INDEX}
        --build-arg PIP_TRUSTED_HOST=${LIARA_PIP_HOST}
        --build-arg APT_MIRROR=${LIARA_APT_MIRROR}
        --build-arg APT_MIRROR_SECURITY=${LIARA_APT_SECURITY}
        -t mlops-platform-base:${CI_COMMIT_SHORT_SHA} .
        -t mlops-platform-base:latest .

deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - kubectl apply -f infra/k8s/
  needs:
    - build
