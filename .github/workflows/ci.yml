name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'

env:
  DOCKER_REGISTRY: docker.io
  PIP_INDEX_URL: "https://pypi.org/simple/"
  PIP_TRUSTED_HOST: "pypi.org"
  APT_MIRROR: "http://deb.debian.org/debian"
  APT_MIRROR_SECURITY: "http://security.debian.org/debian-security"
  PIP_CACHE_DIR: "${{ github.workspace }}/.cache/pip"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  TESTING: "true"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: ${{ env.DOCKER_REGISTRY }}/python:3.11.9-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: .cache/pip
          key: pip-py311-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            pip-py311-
      
      - name: Create cache directory
        run: mkdir -p .cache/pip
      
      - name: Make install script executable
        run: chmod +x scripts/ci_install_deps.sh
      
      - name: Install dependencies
        run: scripts/ci_install_deps.sh
      
      - name: Run tests
        run: python -m pytest tests/ -v -m "not integration" --tb=short

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.HARBOR_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_IMAGE }}/cache
          cache-to: type=registry,ref=${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_IMAGE }}/cache,mode=max
          build-args: |
            DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }}
            PIP_INDEX_URL=${{ env.PIP_INDEX_URL }}
            PIP_TRUSTED_HOST=${{ env.PIP_TRUSTED_HOST }}
            APT_MIRROR=${{ env.APT_MIRROR }}
            APT_MIRROR_SECURITY=${{ env.APT_MIRROR_SECURITY }}