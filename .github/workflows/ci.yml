name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
      - "dev/**"
    paths:
      - "api/**"
      - "shared/**"
      - "trainer/**"
      - "worker/**"
      - "tests/**"
      - "scripts/**"
      - "infra/**"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose.yml"
      - "pytest.ini"
  pull_request:
    branches:
      - main
    paths:
      - "api/**"
      - "shared/**"
      - "trainer/**"
      - "worker/**"
      - "tests/**"
      - "scripts/**"
      - "infra/**"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose.yml"
      - "pytest.ini"
  workflow_dispatch:

env:
  DOCKER_REGISTRY: docker.io
  PIP_INDEX_URL: "https://pypi.org/simple/"
  PIP_TRUSTED_HOST: "pypi.org"
  APT_MIRROR: "http://deb.debian.org/debian"
  APT_MIRROR_SECURITY: "http://security.debian.org/debian-security"
  PIP_CACHE_DIR: "${{ github.workspace }}/.cache/pip"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  TESTING: "true"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: docker.io/python:3.11.9-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: .cache/pip
          key: pip-py311-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            pip-py311-

      - name: Create cache directory
        run: mkdir -p .cache/pip

      - name: Make install script executable
        run: chmod +x scripts/ci_install_deps.sh

      - name: Install dependencies
        run: scripts/ci_install_deps.sh

      - name: Run tests
        run: python -m pytest tests/ -v -m "not integration" --tb=short

  build:
    name: Build and Push Docker Image to GHCR
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mlops-platform
          tags: |
            type=sha,prefix={{date 'YYYYMMDD'}}-{{sha}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }}
            PIP_INDEX_URL=${{ env.PIP_INDEX_URL }}
            PIP_TRUSTED_HOST=${{ env.PIP_TRUSTED_HOST }}
            APT_MIRROR=${{ env.APT_MIRROR }}
            APT_MIRROR_SECURITY=${{ env.APT_MIRROR_SECURITY }}
