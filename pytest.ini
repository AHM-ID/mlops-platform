[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
    -m "not integration"
markers =
    slow: marks tests as slow
    integration: requires live platform services (postgres, redis, mlflow, etc.)
    unit: isolated tests with mocked dependencies (default)
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
